# SonarCloud automatic-analysis configuration.

# Story manifests are declarative content: every story repeats the same
# beat/fact/source scaffolding by design (see docs/story-authoring.md).
# Copy-paste detection on them is categorically noise and would fail the
# duplication gate for every story ever added.
sonar.cpd.exclusions=src/satglobe/stories/**

# OOTK is vendored source. Its nested GitHub workflows are provenance only and
# cannot execute in the parent SatGlobe repository.
sonar.exclusions=src/engine/ootk/.github/**
