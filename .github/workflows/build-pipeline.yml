---
name: SatGlobe CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      # Scoped LFS pull: fetch only the catalog snapshot. Two pre-existing
      # astroux png pointers have no blobs in this fork's LFS storage (GitHub
      # does not copy LFS objects on fork), so a blanket lfs:true checkout
      # fails on them.
      - name: Fetch LFS catalog snapshot
        run: git lfs pull --include="public/tle/tle.json"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate translation types
        run: npm run generate-t7e

      - name: Check engine layering ratchet
        run: npm run check:engine-boundary

      - name: Verify SatGlobe
        run: npm run verify:satglobe

  full-suite:
    name: Full unit suite with coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      # Scoped LFS pull: fetch only the catalog snapshot. Two pre-existing
      # astroux png pointers have no blobs in this fork's LFS storage (GitHub
      # does not copy LFS objects on fork), so a blanket lfs:true checkout
      # fails on them.
      - name: Fetch LFS catalog snapshot
        run: git lfs pull --include="public/tle/tle.json"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate translation types
        run: npm run generate-t7e

      - name: Run full vitest suite with coverage thresholds
        # Invoke the locally installed binary (not npx, which can fetch and run
        # unpinned packages on demand - sonar githubactions:S6505/S8543).
        run: ./node_modules/.bin/vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  performance-ledger:
    name: Performance contracts and immutable ledger
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source and performance history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate locale bundles
        run: npm run generate-t7e

      - name: Test performance policy
        run: ./node_modules/.bin/vitest run scripts/satglobe/performance-contract.test.ts

      - name: Lint performance tooling
        run: ./node_modules/.bin/eslint scripts/satglobe/benchmark-runtime-lite.ts scripts/satglobe/check-build-budget.ts scripts/satglobe/performance-contract.ts scripts/satglobe/performance-contract.test.ts scripts/satglobe/performance-ledger.ts --max-warnings 0

      - name: Validate immutable performance history
        env:
          PERFORMANCE_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: npm run performance:validate

      - name: Publish performance history summary
        run: cat docs/performance/history.md >> "$GITHUB_STEP_SUMMARY"

  e2e:
    name: SatGlobe offline E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      # Scoped LFS pull: fetch only the catalog snapshot. Two pre-existing
      # astroux png pointers have no blobs in this fork's LFS storage (GitHub
      # does not copy LFS objects on fork), so a blanket lfs:true checkout
      # fails on them.
      - name: Fetch LFS catalog snapshot
        run: git lfs pull --include="public/tle/tle.json"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate translation types
        run: npm run generate-t7e

      - name: Install Playwright Chromium
        # Locally installed binary, not npx (sonar githubactions:S6505/S8543).
        run: ./node_modules/.bin/playwright install chromium --with-deps

      - name: Build the satglobe production bundle
        run: npm run build:satglobe

      - name: Run SatGlobe journey E2E
        run: npm run test:e2e:satglobe

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  ootk:
    # The vendored astrodynamics library (src/engine/ootk) is excluded from the
    # host vitest run so app suites stay fast, but its 124 test files cover the
    # propagation math shipping in the bundle - including any local
    # modifications since vendoring - so they gate merges here.
    name: Vendored ootk suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          # This job needs no LFS pull or push, so drop the token from git config.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run vendored ootk tests
        run: npm run test:ootk

  benchmark:
    # Report-only for now (ADR 0002): tracks SGP4 propagation throughput as an
    # artifact so a regression trend is visible; convert to a hard threshold
    # once a few weeks of runner baselines exist.
    name: SGP4 benchmark (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      # Scoped LFS pull: fetch only the catalog snapshot. Two pre-existing
      # astroux png pointers have no blobs in this fork's LFS storage (GitHub
      # does not copy LFS objects on fork), so a blanket lfs:true checkout
      # fails on them.
      - name: Fetch LFS catalog snapshot
        run: git lfs pull --include="public/tle/tle.json"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run SGP4 benchmark (bounded)
        run: npm run benchmark:sgp4 -- --limit 5000 --frames 10

      - name: Upload benchmark results
        uses: actions/upload-artifact@v6
        with:
          name: sgp4-benchmark
          path: benchmark-results/
          retention-days: 90
