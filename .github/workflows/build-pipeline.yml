---
name: SatGlobe CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Initialize public orbital toolkit
        run: git submodule update --init src/engine/ootk

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate translation types
        run: npm run generate-t7e

      - name: Verify SatGlobe
        run: npm run verify:satglobe
