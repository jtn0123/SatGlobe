---
name: SatGlobe CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Initialize public orbital toolkit
        run: git submodule update --init src/engine/ootk

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate translation types
        run: npm run generate-t7e

      - name: Verify SatGlobe
        run: npm run verify:satglobe

  full-suite:
    name: Full unit suite with coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Initialize public orbital toolkit
        run: git submodule update --init src/engine/ootk

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate translation types
        run: npm run generate-t7e

      - name: Run full vitest suite with coverage thresholds
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e:
    name: SatGlobe offline E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Initialize public orbital toolkit
        run: git submodule update --init src/engine/ootk

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate translation types
        run: npm run generate-t7e

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build the satglobe production bundle
        run: npm run build:satglobe

      - name: Run SatGlobe journey E2E
        run: npm run test:e2e:satglobe

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
