---
# Nightly run of the generic public application Playwright suite. The PR
# pipeline owns the dedicated SatGlobe profile journey, which is intentionally
# excluded here so every spec runs against the bundle it was written for.
name: Nightly full E2E

"on":
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-full:
    name: Public plugin and application suite
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      # Scoped LFS pull: fetch only the catalog snapshot. Two pre-existing
      # astroux png pointers have no blobs in this fork's LFS storage (GitHub
      # does not copy LFS objects on fork), so a blanket lfs:true checkout
      # fails on them.
      - name: Fetch LFS catalog snapshot
        run: git lfs pull --include="public/tle/tle.json"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate translation types
        run: npm run generate-t7e

      - name: Install Playwright Chromium
        # Locally installed binary, not npx (sonar githubactions:S6505/S8543).
        run: ./node_modules/.bin/playwright install chromium --with-deps

      - name: Build the public production bundle
        run: npm run build

      - name: Run the public plugin and application suite
        run: ./node_modules/.bin/playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 14
