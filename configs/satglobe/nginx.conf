server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;
  # Keep in sync with SATGLOBE_CSP in build/dev-server-response.ts; the focused
  # dev-server test enforces exact directive parity. 'unsafe-eval' is required by
  # the numeric library's Function() codegen in the main bundle; dropping it is
  # blocked on replacing numeric (grade-report F5).
  add_header Content-Security-Policy "default-src 'self' blob:; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval' blob:; worker-src 'self' blob:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # The early update bootstrap has a stable filename and must not be pinned by
  # the immutable asset rule below. Revalidate it on every navigation.
  location = /service-worker-bootstrap.js {
    # `expires epoch` emits Cache-Control: no-cache without a location-level
    # add_header, so the server-level CSP/nosniff/referrer headers stay inherited.
    expires epoch;
    try_files $uri =404;
  }

  # Catalog data and audit reports keep stable URLs across manual refreshes.
  # Revalidate them on every visit so a refreshed snapshot cannot be hidden by
  # the generic immutable JSON rule below.
  location ~ ^/tle/(?:[^/]+|satglobe/[^/]+)\.json$ {
    expires epoch;
    try_files $uri =404;
  }

  location ~* \.(?:js|css|woff2?|ttf|png|jpg|webp|wasm|json)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }
}
