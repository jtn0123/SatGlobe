server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;
  # Keep in sync with SATGLOBE_CSP in build/dev-server.ts. 'unsafe-eval' is required
  # by the numeric library's Function() codegen in the main bundle; dropping it is
  # blocked on replacing numeric (grade-report F5).
  add_header Content-Security-Policy "default-src 'self' blob:; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval' blob:; worker-src 'self' blob:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|woff2?|ttf|png|jpg|webp|wasm|json)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }
}
